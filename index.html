<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组织学与胚胎学 - 学习资料</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/flexsearch@0.7.43/dist/flexsearch.bundle.min.js"></script>
</head>
<body>

  <aside id="sidebar">
    <div class="sidebar-header">
      <button id="sidebar-close" aria-label="关闭菜单">&times;</button>
      <h1>组织学与胚胎学</h1>
    </div>
    <div class="sidebar-search">
      <input type="text" id="sidebar-search" placeholder="搜索内容..." autocomplete="off">
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button id="dark-toggle" aria-label="切换暗色模式">🌙 暗色模式</button>
    </div>
  </aside>

  <header id="topbar">
    <button id="sidebar-toggle" aria-label="打开菜单">☰</button>
    <h1>组织学与胚胎学</h1>
    <div class="topbar-actions">
      <input type="text" id="topbar-search" placeholder="搜索..." autocomplete="off">
    </div>
  </header>

  <main id="content">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div class="text">加载中...</div>
    </div>

    <div id="welcome">
      <h2>欢迎使用<span class="accent">组织学与胚胎学</span>学习资料</h2>
      <p>请从左侧菜单选择学习内容，或使用搜索功能查找特定知识点。</p>
      <div class="welcome-grid" id="welcome-grid"></div>
    </div>

    <div id="tab-content" style="display:none;">
      <div id="breadcrumb">
        <a id="breadcrumb-home">首页</a>
        <span class="sep">›</span>
        <span class="current" id="breadcrumb-section"></span>
      </div>
      <div id="tab-header">
        <button id="back-btn">← 返回</button>
        <div style="display:flex;align-items:center;">
          <h2 id="tab-title"></h2>
          <button class="self-test-toggle" id="self-test-toggle" title="自测模式：遮住答案看问题">🎓 自测模式</button>
        </div>
        <div id="letter-index"></div>
        <div id="chapter-nav"></div>
      </div>
      <div id="chapter-content"></div>
    </div>

    <div id="search-results" style="display:none;">
      <button id="search-back-btn">← 返回</button>
      <h2>搜索结果：<span id="search-query"></span></h2>
      <div id="search-results-list"></div>
    </div>
  </main>

  <div id="sidebar-overlay"></div>
  <div class="highlight-tooltip" id="highlight-tooltip">
    <button id="hl-add">🖍️ 标记</button>
    <button id="hl-remove" class="danger">✕ 取消标记</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
