<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组织学与胚胎学 - 学习资料</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <button id="sidebar-close" aria-label="关闭菜单">&times;</button>
      <h1>组织学与胚胎学</h1>
    </div>
    <div class="sidebar-search">
      <input type="text" id="sidebar-search" placeholder="搜索内容...">
    </div>
    <nav id="sidebar-nav">
      <!-- Generated by JS -->
    </nav>
    <div class="sidebar-footer">
      <button id="dark-toggle" aria-label="切换暗色模式">🌙 暗色模式</button>
    </div>
  </aside>

  <!-- Mobile top bar -->
  <header id="topbar">
    <button id="sidebar-toggle" aria-label="打开菜单">☰</button>
    <h1>组织学与胚胎学</h1>
    <div class="topbar-actions">
      <input type="text" id="topbar-search" placeholder="搜索...">
    </div>
  </header>

  <!-- Main content -->
  <main id="content">
    <div id="welcome">
      <h2>欢迎使用组织学与胚胎学学习资料</h2>
      <p>请从左侧菜单选择学习内容，或使用搜索功能查找特定知识点。</p>
      <div class="welcome-grid">
        <div class="welcome-card" data-tab="terminology_a">
          <span class="icon">📖</span>
          <span>名词解释 A</span>
        </div>
        <div class="welcome-card" data-tab="keypoints">
          <span class="icon">🎯</span>
          <span>考点汇总</span>
        </div>
        <div class="welcome-card" data-tab="summary_lists">
          <span class="icon">📋</span>
          <span>列表总结</span>
        </div>
        <div class="welcome-card" data-tab="study_outline">
          <span class="icon">📑</span>
          <span>学习大纲</span>
        </div>
        <div class="welcome-card" data-tab="notes">
          <span class="icon">📝</span>
          <span>整理笔记</span>
        </div>
        <div class="welcome-card" data-tab="key_summaries">
          <span class="icon">🔑</span>
          <span>重点总结</span>
        </div>
      </div>
    </div>
    <div id="tab-content" style="display:none;">
      <div id="tab-header">
        <button id="back-btn">← 返回</button>
        <h2 id="tab-title"></h2>
        <div id="chapter-nav"></div>
      </div>
      <div id="chapter-content">
        <!-- Chapter content rendered here -->
      </div>
    </div>
    <!-- Search results -->
    <div id="search-results" style="display:none;">
      <button id="search-back-btn">← 返回</button>
      <h2>搜索结果：<span id="search-query"></span></h2>
      <div id="search-results-list"></div>
    </div>
  </main>

  <!-- Overlay for mobile sidebar -->
  <div id="sidebar-overlay"></div>

  <script src="app.js"></script>
</body>
</html>
